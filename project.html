<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — Alicia Roggema</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/project.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Navigation -->
    <nav id="nav">
        <div class="nav-inner">
            <div class="nav-logo">Alicia Roggema</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#work">Werk</a></li>
                <li><a href="index.html#about">Over mij</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Project Hero -->
    <section class="pj-hero">
        <div class="pj-hero-media" id="pjHeroMedia">
            <div class="pj-hero-placeholder" id="pjHeroPlaceholder"></div>
            <img id="pjHeroCover" class="pj-hero-img" src="" alt="">
        </div>
        <div class="pj-hero-overlay">
            <div class="pj-hero-inner">
                <a href="index.html#work" class="back-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Portfolio
                </a>
                <span class="pj-hero-cat" id="pjCat"></span>
            </div>
        </div>
    </section>

    <!-- Project Info -->
    <section class="pj-info">
        <div class="pj-info-inner">
            <div class="pj-meta">
                <h1 class="pj-title" id="pjTitle"></h1>
                <div class="pj-details">
                    <div class="pj-detail">
                        <span class="pj-detail-label">Jaar</span>
                        <span class="pj-detail-value" id="pjYear"></span>
                    </div>
                    <div class="pj-detail">
                        <span class="pj-detail-label">Locatie</span>
                        <span class="pj-detail-value" id="pjLocation"></span>
                    </div>
                    <div class="pj-detail">
                        <span class="pj-detail-label">Categorie</span>
                        <span class="pj-detail-value" id="pjCategory"></span>
                    </div>
                </div>
                <div class="pj-tools" id="pjTools"></div>
            </div>
            <div class="pj-description" id="pjDescription"></div>
        </div>
    </section>

    <!-- Divider -->
    <div class="pj-divider"></div>

    <!-- Video Player (shown only if project has a video) -->
    <section class="pj-video-section" id="pjVideoSection" style="display:none">
        <div class="pj-video-inner">
            <h2 class="pj-gallery-title">Video</h2>
            <div class="pj-video-wrap" id="pjVideoWrap">
                <!-- filled by project.js -->
            </div>
        </div>
    </section>

    <!-- Photo Gallery -->
    <section class="pj-gallery-section" id="pjGallerySection">
        <div class="pj-gallery-inner">
            <h2 class="pj-gallery-title">Foto's</h2>
            <div class="pj-gallery" id="pjGallery"></div>
        </div>
    </section>

    <!-- Next Project -->
    <section class="pj-next" id="pjNext" style="display:none">
        <div class="pj-next-inner">
            <span class="pj-next-label">Volgend project</span>
            <a class="pj-next-card" id="pjNextCard" href="#">
                <div class="pj-next-thumb" id="pjNextThumb"></div>
                <div class="pj-next-info">
                    <span class="pj-next-cat" id="pjNextCat"></span>
                    <h3 class="pj-next-title" id="pjNextTitle"></h3>
                    <span class="pj-next-arrow">→</span>
                </div>
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-inner">
            <span class="footer-logo">Alicia Roggema</span>
            <span class="footer-copy">© 2026 · Gemaakt met passie in Groningen</span>
        </div>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-prev" id="lbPrev" onclick="event.stopPropagation(); lightboxStep(-1)">‹</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
        <button class="lightbox-next" id="lbNext" onclick="event.stopPropagation(); lightboxStep(1)">›</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/project.js"></script>
</body>
</html>
